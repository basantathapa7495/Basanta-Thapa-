<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Basanta Saru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=DM+Mono&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="project.css">
</head>
<body>
    <div class="blob-bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    
    <div id="navbar-container"></div>
    
    <main>
        <header class="project-page-header fade-up">
            <h1>My Projects</h1>
            <p>Things I've built & experiments in progress. a collection of web apps, tools, and creative projects built with curiosity and care.</p>
        </header>
        
        <!-- Search Section -->
        <div class="project-search-section fade-up">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search Projects..." class="search-input">
            </div>
        </div>
        
        <!-- Filter Buttons -->
        <div class="project-filter-section fade-up">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="web-app">Web App</button>
            <button class="filter-btn" data-category="utility">Utility</button>
            <button class="filter-btn" data-category="fun-tool">Fun Tool</button>
        </div>
        
        <!-- Project Grid -->
        <div class="project-grid" id="projectGrid">
            <!-- Projects will be loaded here by project.js -->
        </div>
    </main>
    
    <div id="footer-container"></div>
    
    <script src="../components.js"></script>
    <script src="project.js"></script>
</body>
</html>

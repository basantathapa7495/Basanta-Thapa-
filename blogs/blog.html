<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Basanta Saru</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;500;600;700&family=DM+Mono&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../style.css">
    <link rel="stylesheet" href="blog.css">
</head>
<body>
    <div class="blob-bg">
        <div class="blob blob1"></div>
        <div class="blob blob2"></div>
        <div class="blob blob3"></div>
    </div>
    
    <div id="navbar-container"></div>
    
    <main>
        <header class="blog-page-header fade-up">
<h1 style="color: green;">The journal</h1>
            <p>Thoughts, essays, & building in public. documenting the messy, beautiful art of becoming.</p>
        </header>
        
        <!-- Search Section -->
        <div class="blog-search-section fade-up">
            <div class="search-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"></circle>
                    <path d="m21 21-4.35-4.35"></path>
                </svg>
                <input type="text" id="searchInput" placeholder="Search Articles..." class="search-input">
            </div>
        </div>
        
        <!-- Filter Buttons -->
        <div class="blog-filter-section fade-up">
            <button class="filter-btn active" data-category="all">All</button>
            <button class="filter-btn" data-category="programming">Programming</button>
            <button class="filter-btn" data-category="books">Books</button>
            <button class="filter-btn" data-category="business">Business</button>
            <button class="filter-btn" data-category="life">Life</button>
            <button class="filter-btn" data-category="updates">Updates</button>
        </div>
        
        <!-- Blog Grid -->
        <div class="blog-grid" id="blogGrid">
            <!-- Blog posts will be loaded here by blog.js -->
        </div>
    </main>
    
    <div id="footer-container"></div>
    
    <script src="../components.js"></script>
    <script src="blog.js"></script>
</body>
</html>
